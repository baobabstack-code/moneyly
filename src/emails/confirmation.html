<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your signup</title>
  <!--[if mso]>
  <style type="text/css">
    body, table, td { font-family: Arial, Helvetica, sans-serif !important; }
  </style>
  <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #0f0f0f; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <!-- Background wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" width="100%" style="background-color: #0f0f0f; min-height: 100vh;">
    <tr>
      <td align="center" style="padding: 48px 20px;">
        
        <!-- Main card -->
        <table role="presentation" cellspacing="0" cellpadding="0" style="max-width: 480px; width: 100%;">
          
          <!-- Logo area -->
          <tr>
            <td style="text-align: center; padding-bottom: 40px;">
              <span style="font-size: 18px; font-weight: 800; letter-spacing: 4px; color: #ffffff; text-transform: uppercase;">HTB Global</span>
            </td>
          </tr>
          
          <!-- Card -->
          <tr>
            <td style="background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%); border-radius: 24px; border: 1px solid #2a2a2a; overflow: hidden;">
              
              <!-- Glow effect -->
              <table role="presentation" width="100%" style="background: radial-gradient(ellipse at top, rgba(0, 81, 213, 0.15) 0%, transparent 70%);">
                <tr>
                  <td style="padding: 48px 40px 40px;">
                    
                    <!-- Icon -->
                    <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 0 auto 32px;">
                      <tr>
                        <td style="width: 72px; height: 72px; background: linear-gradient(135deg, #0051D5 0%, #4338ca 100%); border-radius: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0, 81, 213, 0.3);">
                          <span style="color: #ffffff; font-size: 32px; line-height: 72px;">✓</span>
                        </td>
                      </tr>
                    </table>
                    
                    <!-- Heading -->
                    <h1 style="margin: 0 0 16px; color: #ffffff; font-size: 28px; font-weight: 600; text-align: center; line-height: 1.3;">
                      Confirm your signup
                    </h1>
                    
                    <!-- Subtext -->
                    <p style="margin: 0 0 32px; color: #a1a1aa; font-size: 16px; line-height: 1.6; text-align: center;">
                      Tap the button below to verify your email address and complete your account setup.
                    </p>
                    
                    <!-- Button -->
                    <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 0 auto;">
                      <tr>
                        <td style="text-align: center;">
                          <a href="{{ .ConfirmationURL }}" style="display: inline-block; background: linear-gradient(135deg, #0051D5 0%, #4338ca 100%); color: #ffffff; font-size: 16px; font-weight: 600; text-decoration: none; padding: 16px 40px; border-radius: 14px; box-shadow: 0 4px 24px rgba(0, 81, 213, 0.4); transition: all 0.2s;">
                            Confirm Email
                          </a>
                        </td>
                      </tr>
                    </table>
                    
                    <!-- Expiry note -->
                    <p style="margin: 24px 0 0; color: #52525b; font-size: 13px; text-align: center;">
                      This link expires in 24 hours
                    </p>
                    
                  </td>
                </tr>
              </table>
              
              <!-- Divider -->
              <tr>
                <td style="height: 1px; background: linear-gradient(90deg, transparent 0%, #2a2a2a 20%, #2a2a2a 80%, transparent 100%);"></td>
              </tr>
              
              <!-- Footer -->
              <tr>
                <td style="padding: 24px 40px; text-align: center;">
                  <p style="margin: 0; color: #52525b; font-size: 12px; line-height: 1.6;">
                    Didn't request this? You can safely ignore this email.
                  </p>
                  <p style="margin: 8px 0 0; color: #3f3f46; font-size: 11px;">
                    © 2024 HTB Global. All rights reserved.
                  </p>
                </td>
              </tr>
              
            </td>
          </tr>
          
          <!-- Bottom spacing -->
          <tr>
            <td style="height: 40px;"></td>
          </tr>
          
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
